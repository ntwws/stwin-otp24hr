name: Build and release OTP24HR

on:
  push:
    branches: [main]
    paths-ignore: [update.json]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.0.8

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore application icon
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes('1.ico', [Convert]::FromBase64String((Get-Content '1.ico.b64' -Raw)))
      - name: Stamp application version
        shell: pwsh
        run: |
          $source = Get-Content 'desktop_app.py' -Raw
          $source = $source -replace 'APP_VERSION = "[^"]+"', "APP_VERSION = `"$env:APP_VERSION`""
          Set-Content 'desktop_app.py' -Value $source -Encoding utf8
      - run: python -m pip install pyinstaller
      - run: python -m PyInstaller --noconfirm HeroLineTH.spec
      - name: Prepare release and manifest
        shell: pwsh
        run: |
          Copy-Item 'dist/OTP24HR by STWIN.exe' 'OTP24HR-by-STWIN.exe'
          $hash = (Get-FileHash 'OTP24HR-by-STWIN.exe' -Algorithm SHA256).Hash.ToLower()
          $manifest = [ordered]@{
            version = $env:APP_VERSION
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$env:APP_VERSION/OTP24HR-by-STWIN.exe"
            sha256 = $hash
            notes = "UI improvements, cancelled-row cleanup, and secure automatic updates"
          }
          $manifest | ConvertTo-Json | Set-Content update.json -Encoding utf8
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: OTP24HR v${{ env.APP_VERSION }}
          files: OTP24HR-by-STWIN.exe
      - name: Publish update manifest
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add update.json
          git commit -m "Publish update manifest v$env:APP_VERSION"
          git push

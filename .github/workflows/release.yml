name: Build and release OTP24HR

on:
  push:
    branches: [main]
    paths-ignore: [update.json]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read application version
        shell: pwsh
        run: |
          $match = Select-String -Path 'desktop_app.py' -Pattern 'APP_VERSION = "([^"]+)"'
          if (-not $match) { throw 'APP_VERSION was not found in desktop_app.py' }
          $version = $match.Matches[0].Groups[1].Value
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore application icon
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes('1.ico', [Convert]::FromBase64String((Get-Content '1.ico.b64' -Raw)))
      - name: Install application dependencies
        run: python -m pip install -r requirements.txt
      - run: python -m PyInstaller --noconfirm HeroLineTH.spec
      - name: Verify required modules are bundled
        shell: pwsh
        run: |
          $contents = pyi-archive_viewer -r -b 'dist/OTP24HR by STWIN/OTP24HR by STWIN.exe'
          foreach ($required in @('customtkinter', 'tkinter.filedialog')) {
            if (-not ($contents | Select-String -SimpleMatch $required)) {
              throw "Packaged EXE is missing $required"
            }
          }
      - name: Prepare release and manifest
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist/OTP24HR by STWIN/*' -DestinationPath 'OTP24HR-by-STWIN-portable.zip' -Force
          $hash = (Get-FileHash 'OTP24HR-by-STWIN-portable.zip' -Algorithm SHA256).Hash.ToLower()
          $manifest = [ordered]@{
            version = $env:APP_VERSION
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$env:APP_VERSION/OTP24HR-by-STWIN-portable.zip"
            sha256 = $hash
            package_type = "zip"
            notes = "Portable folder build: no temporary DLL extraction"
          }
          $manifest | ConvertTo-Json | Set-Content update.json -Encoding utf8
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: OTP24HR v${{ env.APP_VERSION }}
          files: OTP24HR-by-STWIN-portable.zip
      - name: Publish update manifest
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add update.json
          git commit -m "Publish update manifest v$env:APP_VERSION"
          git push
